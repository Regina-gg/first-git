name: AI Stock Monitor Daily Reports

on:
  schedule:
    - cron: "30 0 * * 1-5"   # 08:30 Asia/Shanghai
    - cron: "5 2 * * 1-5"    # 10:05 Asia/Shanghai
    - cron: "10 7 * * 1-5"   # 15:10 Asia/Shanghai
    - cron: "5 13 * * 1-5"   # 21:05 Asia/Shanghai
  workflow_dispatch:
    inputs:
      report_type:
        description: "Report type"
        required: true
        default: "close_report"

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install lark-cli
        run: |
          npm install -g @larksuite/cli
          lark-cli --version
      - name: Install market data dependencies
        run: python -m pip install -r requirements-akshare.txt
      - name: Validate Feishu secrets
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: |
          test -n "$FEISHU_APP_ID"
          test -n "$FEISHU_APP_SECRET"
          test -n "$FEISHU_CHAT_ID"
          [[ "$FEISHU_APP_ID" == cli_* ]]
          [[ "$FEISHU_CHAT_ID" == oc_* ]]
          [[ "$FEISHU_APP_ID" != *=* ]]
          [[ "$FEISHU_APP_SECRET" != *=* ]]
          [[ "$FEISHU_CHAT_ID" != *=* ]]
      - name: Configure lark-cli bot profile
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          printf '%s' "$FEISHU_APP_SECRET" | lark-cli config init \
            --app-id "$FEISHU_APP_ID" \
            --app-secret-stdin \
            --brand feishu \
            --name stock-monitor
          lark-cli --profile stock-monitor doctor --offline
      - name: Select report type
        id: report
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.report_type }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "30 0 * * 1-5") echo "type=pre_market" >> "$GITHUB_OUTPUT" ;;
              "5 2 * * 1-5") echo "type=morning_check" >> "$GITHUB_OUTPUT" ;;
              "10 7 * * 1-5") echo "type=close_report" >> "$GITHUB_OUTPUT" ;;
              "5 13 * * 1-5") echo "type=evening_intel" >> "$GITHUB_OUTPUT" ;;
              *) echo "type=close_report" >> "$GITHUB_OUTPUT" ;;
            esac
          fi
      - name: Calibrate thresholds
        env:
          DATA_PROVIDER: multi
          MARKET_DATA_CHAIN: tushare,eastmoney,akshare
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python -m stock_monitor.calibrate_thresholds
      - name: Run report
        env:
          DATA_PROVIDER: multi
          MARKET_DATA_CHAIN: tushare,eastmoney,akshare
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          FEISHU_DELIVERY_PROVIDER: lark_cli
          FEISHU_SEND_AS: bot
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          LARK_CLI_PROFILE: stock-monitor
        run: python -m stock_monitor.run_report --type "${{ steps.report.outputs.type }}"
